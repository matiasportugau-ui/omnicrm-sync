<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>OmniCRM Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="popup-header">
    <div class="popup-header-left">
      <svg class="popup-logo" viewBox="0 0 32 32" width="28" height="28">
        <circle cx="16" cy="16" r="14" fill="#4F46E5"/>
        <path d="M10 16l4 4 8-8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <h1 class="popup-title">OmniCRM Sync</h1>
        <span class="popup-version" id="headerVersion">v1.0.0</span>
      </div>
    </div>
    <div class="popup-header-status" id="globalStatus">
      <span class="status-dot active"></span>
      <span class="status-label">Active</span>
    </div>
  </header>

  <main class="popup-body">
    <!-- Platform Cards -->
    <section class="platform-cards" id="platformCards">
      <div class="platform-card" data-platform="whatsapp">
        <div class="platform-card-left">
          <div class="platform-icon" style="background:#25D366">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
          </div>
          <div class="platform-info">
            <span class="platform-name">WhatsApp</span>
            <span class="platform-stat" data-stat="whatsapp">0 today</span>
          </div>
        </div>
        <div class="platform-card-right">
          <span class="status-dot active" data-status="whatsapp"></span>
          <label class="toggle">
            <input type="checkbox" checked data-toggle="whatsapp">
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>

      <div class="platform-card" data-platform="mercadolibre">
        <div class="platform-card-left">
          <div class="platform-icon" style="background:#FFE600">
            <svg viewBox="0 0 24 24" width="18" height="18"><text x="12" y="17" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">ML</text></svg>
          </div>
          <div class="platform-info">
            <span class="platform-name">MercadoLibre</span>
            <span class="platform-stat" data-stat="mercadolibre">0 today</span>
          </div>
        </div>
        <div class="platform-card-right">
          <span class="status-dot active" data-status="mercadolibre"></span>
          <label class="toggle">
            <input type="checkbox" checked data-toggle="mercadolibre">
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>

      <div class="platform-card" data-platform="facebook">
        <div class="platform-card-left">
          <div class="platform-icon" style="background:#0084FF">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          </div>
          <div class="platform-info">
            <span class="platform-name">Facebook</span>
            <span class="platform-stat" data-stat="facebook">0 today</span>
          </div>
        </div>
        <div class="platform-card-right">
          <span class="status-dot active" data-status="facebook"></span>
          <label class="toggle">
            <input type="checkbox" checked data-toggle="facebook">
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>

      <div class="platform-card" data-platform="instagram">
        <div class="platform-card-left">
          <div class="platform-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </div>
          <div class="platform-info">
            <span class="platform-name">Instagram</span>
            <span class="platform-stat" data-stat="instagram">0 today</span>
          </div>
        </div>
        <div class="platform-card-right">
          <span class="status-dot active" data-status="instagram"></span>
          <label class="toggle">
            <input type="checkbox" checked data-toggle="instagram">
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>
    </section>

    <!-- Summary Stats -->
    <section class="summary-stats" id="summaryStats">
      <div class="stat-item">
        <span class="stat-value" id="totalToday">0</span>
        <span class="stat-label">Synced Today</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalAll">0</span>
        <span class="stat-label">Total Synced</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="quick-actions">
      <button class="btn btn-secondary" id="btnSettings">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        Open Settings
      </button>
      <button class="btn btn-primary" id="btnPauseAll">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span id="pauseAllLabel">Pause All</span>
      </button>
    </section>
  </main>

  <footer class="popup-footer">
    <span>OmniCRM Sync <span id="footerVersion">v1.0.0</span></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
